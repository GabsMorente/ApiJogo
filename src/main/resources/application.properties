spring.application.name=crudproject

# ==================== Porta (funciona no Render e local) ====================
server.port=${PORT:8080}

# ==================== Banco de Dados ====================

# H2 (usado localmente quando não tem variáveis do PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Configurações JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# H2 Console (acessível em /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
